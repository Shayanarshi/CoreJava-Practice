name: Daily Auto Commit

on:
  schedule:
    - cron: "0 18 * * *"   # 11:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make daily update
        run: echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
